<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp 12A2 - Kỷ Yếu Học Tập</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BẢNG MÀU XANH DƯƠNG */
        :root {
            --primary: #3498db; 
            --secondary: #2980b9; 
            --accent: #00d2d3; 
            --light1: #ebf5fb; 
            --light2: #e1f5fe; 
            --light3: #bbdefb; 
            --dark: #2c3e50;
            --text: #34495e;
            --white: #ffffff;
            --gradient1: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            --gradient2: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient3: linear-gradient(135deg, #1e3799 0%, #0c2461 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            background-color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 120px; /* Tăng chiều cao navbar để chứa logo to */
            background: rgba(52, 152, 219, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            padding: 0 2rem;
            display: flex;
            align-items: center;
        }

        .nav-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        /* Style cho logo hình tròn to hơn */
        .nav-brand img {
            height: 100px; /* Phóng to logo */
            width: 100px;
            border-radius: 50%; /* Bo tròn logo */
            border: 3px solid var(--white); /* Thêm viền trắng */
            object-fit: cover;
            vertical-align: middle;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .nav-brand:hover {
            transform: scale(1.05);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--white);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* ========== AVATAR MỚI TRONG GRID ========== */
        .member-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Đảm bảo ảnh lấp đầy vòng tròn */
            border-radius: 50%;
        }

        /* ========== PAGE CONTAINER ========== */
        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .hero {
            min-height: 100vh;
            background: var(--gradient1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            margin-top: 0; /* Đã có height navbar */
            position: relative;
            overflow: hidden;
        }

        /* ========== GALLERY / MEMBERS SECTION ========== */
        section {
            padding: 140px 2rem 6rem; /* Padding top lớn hơn do navbar cao */
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            margin-bottom: 3rem;
            position: relative;
            color: var(--dark);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            background: var(--white);
            padding: 1.5rem;
            text-align: center;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(52, 152, 219, 0.3);
        }

        .gallery-img-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--gradient1);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
            position: relative;
            border: 3px solid var(--light1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(52, 152, 219, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 50%;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-icon {
            font-size: 2rem;
            color: var(--white);
        }

        .gallery-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        /* ========== DETAIL PAGE ========== */
        .detail-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #e1f5fe 0%, #ebf5fb 100%);
            padding: 140px 2rem 3rem;
        }

        .detail-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border: 5px solid var(--white);
            overflow: hidden;
        }

        .detail-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ... giữ các style animations cũ ... */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

        </section>

    <div id="detail" class="page">
        <div class="detail-page">
            <div style="max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15);">

                    <p id="detailRole"></p>

                <div style="padding: 3rem 2rem;">
                    <h3 id="birthDate" style="margin-bottom: 1rem; color: var(--primary);"></h3>
                    <div id="memberBio"></div>
                </div>
            </div>
        </div>
    </div>

        function renderMembers() {
            document.getElementById('membersGrid').innerHTML = members.map(m => `
                <div class="gallery-item" onclick="showMemberDetail(${m.id})">
                    <div class="gallery-img-container">
                        ${m.image ? `<img src="${m.image}" class="member-img">` : `<div>${m.emoji}</div>`}
                        <div class="gallery-overlay"><span class="gallery-icon">👁️</span></div>
                    </div>
                    <div class="gallery-title">${m.name}</div>
                    <div style="color: var(--primary); font-size: 0.8rem;">${m.birthDate}</div>
                </div>`).join('');
        }

        function showMemberDetail(id) {
            const m = members.find(x => x.id === id);
            const avatarDiv = document.getElementById('detailAvatar');
            if (m.image) {
                avatarDiv.innerHTML = `<img src="${m.image}">`;
            } else {
                avatarDiv.innerHTML = m.emoji;
                avatarDiv.style.fontSize = '4rem';
            }
            document.getElementById('detailName').textContent = m.name;
            document.getElementById('detailRole').textContent = 'Học sinh lớp 12A2';
            document.getElementById('birthDate').textContent = '📅 Ngày sinh: ' + m.birthDate;
            document.getElementById('memberBio').innerHTML = `<p>${m.bio}</p>`;
            showPage('detail');
        }

        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
            window.scrollTo(0, 0);
        }

        // Khởi tạo
        document.addEventListener('DOMContentLoaded', () => {
            renderMembers();
            // render các phần khác tương tự...
        });
