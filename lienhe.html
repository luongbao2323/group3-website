<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Lớp 12A2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
	
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="anhlogomenu.jpg" alt="Logo 12A2" class="logo-img">
            <span class="class-name">Lớp 12A2</span>
        </a>
    </header>

    <main class="main-content">
        <div class="contact-card">
            <h2>LIÊN HỆ VỚI CHÚNG TÔI</h2>
            <div class="underline"></div>
            <p class="subtitle">Gửi nguyện vọng của bạn đến tập thể lớp 12A2</p>
            
            <form action="#">
                <div class="form-group">
                    <label for="name">Họ và Tên</label>
                    <input type="text" id="name" name="name" placeholder="Nhập tên của bạn..." required>
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại liên hệ</label>
                    <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại..." required>
                </div>

                <div class="form-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="wish">Nguyện vọng của mình</label>
                    <textarea id="wish" name="wish" rows="4" placeholder="Chia sẻ tâm tư hoặc nguyện vọng của bạn..."></textarea>
                </div>

                <button type="submit" class="btn-submit">GỬI YÊU CẦU</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 Lớp 12A2 - Niên khóa 2023-2026</p>
        <p style="margin-top: 5px; font-size: 0.75rem;">Thiết kế bởi Thành viên lớp 12A2</p>
    </footer>

</body>
</html>
