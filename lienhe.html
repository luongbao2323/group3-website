<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Liên Hệ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contact-container">
        <h2>Liên Hệ Với Chúng Tôi</h2>
        <p>Vui lòng điền thông tin dưới đây, chúng tôi sẽ phản hồi bạn sớm nhất!</p>
        
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Họ và Tên:</label>
                <input type="text" id="name" name="name" placeholder="Nhập họ tên của bạn..." required>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại..." required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Ví dụ: email@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="wish">Nguyện vọng của bạn:</label>
                <textarea id="wish" name="wish" rows="5" placeholder="Hãy chia sẻ nguyện vọng hoặc lời nhắn của bạn..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Gửi Liên Hệ</button>
        </form>
    </div>

</body>
</html>
