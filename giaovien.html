<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Thầy Sang</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f6;
        }

        .avatar-container {
            /* Kích thước khung tròn */
            width: 220px;
            height: 220px;
            
            /* Tạo hình tròn và ẩn phần thừa */
            border-radius: 50%;
            overflow: hidden;
            
            /* Viền và đổ bóng chuẩn như ảnh mẫu */
            border: 6px solid white;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
            
            /* Căn giữa */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            
            /* ĐIỀU CHỈNH QUAN TRỌNG:
               1. 'center 10%': Dịch chuyển ảnh xuống để lấy đúng phần đầu/kính/nón bảo hiểm.
               2. 'scale(2.2)': Phóng to để gương mặt chiếm trọn khung hình tròn.
            */
            object-position: center 10%; 
            transform: scale(2.2);
            transform-origin: center 10%;
        }
    </style>
</head>
<body>

    <div class="avatar-container">
        <img src="sangjr.jpg" alt="Avatar" class="avatar-img">
    </div>

</body>
</html>
