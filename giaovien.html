<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giáo viên - 12A2</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS bổ sung để tạo hiệu ứng hình tròn (avatar) */
        .avatar-container {
            width: 150px; 
            height: 150px;
            border-radius: 50%; 
            overflow: hidden; 
            margin: 0 auto 20px; 
            border: 4px solid #fff; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block; 
        }

        /* Tùy chỉnh thêm cho các thẻ giáo viên */
        .gallery-item {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center; /* Căn giữa nội dung trong thẻ */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .teacher-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 5px;
        }

        .teacher-role {
            font-family: 'Poppins', sans-serif;
            color: var(--primary); /* Giả sử bạn có biến --primary */
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .teacher-desc {
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: #666;
            line-height: 1.8;
        }
    </style>
</head>
<body>   

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand"><img src="logo_gen.png" alt="Logo"></a>
            <ul class="nav-menu">
                <li><a class="nav-link" href="index.html">Trang chủ</a></li>
                <li><a class="nav-link" href="thanhvien.html">Thành viên</a></li>
                <li><a class="nav-link active" href="giaovien.html">Giáo viên</a></li>
                <li><a class="nav-link" href="anh.html">Ảnh</a></li>
                <li><a class="nav-link" href="lien-he.html">Liên hệ</a></li>
            </ul>
        </div>
    </nav>

    <section style="padding-top: 120px; padding-bottom: 80px; min-height: 100vh; background: #f0f9ff;">
        <div class="container">
            <h2 class="section-title" style="text-align: center; margin-bottom: 60px;">Giáo viên chủ nhiệm & Bộ môn</h2>
            
            <div class="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
                
                <div class="gallery-item">
                    <div class="avatar-container">
                        <img src="path/to/image-thay-sang.jpg" alt="Thầy Nguyễn Trọng Sang" class="avatar-img">
                    </div>
                    <div class="teacher-name">Thầy Nguyễn Trọng Sang</div>
                    <div class="teacher-role">Chủ nhiệm lớp 12A2</div>
                    <p class="teacher-desc">
                        Thầy là người dẫn dắt lớp 12A2 với tâm huyết và sự tận tụy. <br>
                        Tốt nghiệp Đại học Sư phạm TP.HCM.
                    </p>
                </div>

                </div>
        </div>
    </section>
</body>
</html>
