<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiểu sử Thầy Nguyễn Trọng Sang</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 50px 20px; }
        .profile-box { background: white; max-width: 700px; width: 100%; padding: 40px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .back-btn { color: #3498db; text-decoration: none; font-weight: 600; display: block; margin-bottom: 20px; }
        .info-header { display: flex; gap: 30px; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 30px; }
        .info-header img { width: 180px; height: 180px; border-radius: 15px; object-fit: cover; }
        h1 { margin: 0; color: #2c3e50; }
        .role-tag { color: #3498db; font-weight: 600; }
        .bio-text { margin-top: 30px; line-height: 1.8; color: #555; }
    </style>
</head>
<body>
    <div class="profile-box">
        <a href="giaovien.html" class="back-btn">← Quay lại</a>
        <div class="info-header">
            <img src="sangjr.jpg" alt="Nguyễn Trọng Sang">
            <div>
                <p class="role-tag">Giáo viên Chủ nhiệm lớp 12A2</p>
                <h1>Nguyễn Trọng Sang</h1>
            </div>
        </div>
        <div class="bio-text">
            <h3>Quá trình đào tạo</h3>
            <p>Tốt nghiệp Đại học Sư phạm TP.HCM.</p>
            <h3>Giới thiệu</h3>
            <p>Thầy là người dẫn dắt lớp 12A2 với tâm huyết và sự tận tụy. Với phong cách giảng dạy hiện đại, thầy luôn tạo điều kiện tốt nhất để học sinh phát triển năng lực cá nhân.</p>
        </div>
    </div>
</body>
</html>
