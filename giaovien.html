<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giáo viên - 12A2</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ======================================================
           CSS Bổ Sung: Định dạng ảnh đại diện thành hình tròn
           ====================================================== */
        
        /* Container bọc bên ngoài ảnh đại diện */
        .avatar-wrapper {
            width: 150px;           /* Chiều rộng của khung tròn */
            height: 150px;          /* Chiều cao của khung tròn (phải bằng chiều rộng) */
            border-radius: 50%;     /* Bo tròn 50% để tạo thành hình tròn */
            overflow: hidden;       /* Ẩn các phần của ảnh bị thừa ra ngoài khung tròn */
            margin: 0 auto 20px;    /* Căn giữa khung tròn và tạo khoảng cách phía dưới */
            border: 5px solid #fff; /* Thêm viền trắng (tùy chọn) */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* Thêm đổ bóng nhẹ (tùy chọn) */
            display: flex;          /* Sử dụng Flexbox để căn giữa ảnh */
            justify-content: center;/* Căn giữa ảnh theo chiều ngang */
            align-items: center;    /* Căn giữa ảnh theo chiều dọc */
            background-color: #eee; /* Màu nền khi ảnh chưa tải xong */
        }

        /* Định dạng cho bản thân hình ảnh */
        .avatar-img {
            width: 100%;            /* Chiều rộng ảnh chiếm 100% khung */
            height: 100%;           /* Chiều cao ảnh chiếm 100% khung */
            object-fit: cover;      /* Giữ nguyên tỷ lệ ảnh, tự cắt tỉa để lấp đầy khung mà không bị méo */
            display: block;         /* Hiển thị dạng khối */
        }

        /* ======================================================
           CSS Bổ Sung: Định dạng chung cho thẻ giáo viên
           ====================================================== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .gallery-item {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .teacher-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #333;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .teacher-role {
            font-family: 'Poppins', sans-serif;
            color: #007bff; /* Bạn có thể thay đổi màu chính ở đây */
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .teacher-desc {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            color: #666;
            line-height: 1.8;
            margin: 0;
        }
    </style>
</head>
<body>   

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand"><img src="logo_gen.png" alt="Logo"></a>
            <ul class="nav-menu">
                <li><a class="nav-link" href="index.html">Trang chủ</a></li>
                <li><a class="nav-link" href="thanhvien.html">Thành viên</a></li>
                <li><a class="nav-link active" href="giaovien.html">Giáo viên</a></li>
                <li><a class="nav-link" href="anh.html">Ảnh</a></li>
                <li><a class="nav-link" href="lien-he.html">Liên hệ</a></li>
            </ul>
        </div>
    </nav>

    <section style="padding-top: 150px; padding-bottom: 80px; min-height: 100vh; background: #f0f9ff;">
        <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
            <h2 class="section-title" style="text-align: center; margin-bottom: 60px; font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #333;">Giáo viên chủ nhiệm & Bộ môn</h2>
            
            <div class="gallery-grid">
                
                <div class="gallery-item">
                    <div class="avatar-wrapper">
                        <img src="path/to/image-thay-sang.jpg" alt="Thầy Nguyễn Trọng Sang" class="avatar-img">
                    </div>
                    
                    <div class="teacher-name">Thầy Nguyễn Trọng Sang</div>
                    <div class="teacher-role">Chủ nhiệm lớp 12A2</div>
                    <p class="teacher-desc">
                        Thầy là người dẫn dắt lớp 12A2 với tâm huyết và sự tận tụy. <br>
                        Tốt nghiệp Đại học Sư phạm TP.HCM.
                    </p>
                </div>

                </div>
        </div>
    </section>
</body>
</html>
