<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Thầy Nguyễn Trọng Sang</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8; /* Màu nền nhẹ nhàng hơn */
        }

        .avatar-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15); /* Đổ bóng mịn hơn */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            /* Tỉ lệ 20% giúp căn khung hình tập trung vào phần đầu và vai 
               thay vì bị cắt mất mặt do ảnh gốc quá dài.
            */
            object-position: center 20%; 
        }
    </style>
</head>
<body>

    <div class="avatar-container">
        <img src="sangjr.jpg" alt="Thầy Nguyễn Trọng Sang" class="avatar-img">
    </div>

</body>
</html>
