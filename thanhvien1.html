<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia đình 12A2 - Danh sách Tổ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- PHẦN CSS TẠO GIAO DIỆN GIỐNG ẢNH --- */
        :root {
            --bg-color: #e3effb; /* Màu xanh nhạt của nền */
            --card-bg: rgba(255, 255, 255, 0.5); /* Độ trong suốt của thẻ */
            --accent-color: #b8d1e8; /* Màu xanh của vòng tròn avatar */
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 50px;
            font-weight: 700;
        }

        /* Lưới hiển thị 4 Tổ */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
        }

        /* Thẻ Tổ (Card) */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px); /* Hiệu ứng kính mờ */
            border-radius: 25px;
            padding: 40px 20px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        /* Vòng tròn Avatar */
        .avatar-circle {
            width: 110px;
            height: 110px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 20px;
            border: 5px solid #ffffff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .name {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 5px 0;
        }

        .sub-info {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 400;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr 1fr; /* Hiện 2 cột trên điện thoại */
                gap: 15px;
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gia đình 12A2</h1>
        
        <div class="gallery-grid">
            <a href="to1.html" class="card">
                <div class="avatar-circle">🚩</div>
                <div class="name">Tổ 1</div>
                <div class="sub-info">10 Thành viên</div>
            </a>

            <a href="to2.html" class="card">
                <div class="avatar-circle">🛡️</div>
                <div class="name">Tổ 2</div>
                <div class="sub-info">9 Thành viên</div>
            </a>

            <a href="to3.html" class="card">
                <div class="avatar-circle">⚡</div>
                <div class="name">Tổ 3</div>
                <div class="sub-info">9 Thành viên</div>
            </a>

            <a href="to4.html" class="card">
                <div class="avatar-circle">🌟</div>
                <div class="name">Tổ 4</div>
                <div class="sub-info">8 Thành viên</div>
            </a>
        </div>
    </div>

</body>
</html>
