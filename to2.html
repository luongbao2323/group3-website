<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thành viên Tổ 1 - 12A2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- PHẦN CSS ĐỒNG BỘ VỚI TRANG CHỦ --- */
        :root {
            --bg-color: #e3effb; 
            --card-bg: rgba(255, 255, 255, 0.5);
            --accent-color: #b8d1e8; 
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            padding: 0 20px;
            text-align: center;
        }

        .header-section {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-sub);
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-back:hover {
            color: #000;
        }

        /* Lưới hiển thị thành viên */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        /* Thẻ Thành viên (Card) */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 15px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
        }

        /* Vòng tròn Avatar (Hỗ trợ cả Emoji và Ảnh) */
        .avatar-circle {
            width: 100px;
            height: 100px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            margin-bottom: 15px;
            border: 4px solid #ffffff;
            overflow: hidden; /* Để ảnh không tràn khỏi vòng tròn */
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .sub-info {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        /* Tương thích điện thoại */
        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            .avatar-circle { width: 80px; height: 80px; font-size: 35px; }
            .name { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <a href="index.html" class="btn-back">← Quay lại trang chủ</a>
            <h1>Thành viên Tổ 1</h1>
        </div>
        
        <div class="gallery-grid" id="memberGrid">
            </div>
    </div>

    <script>
        // DỮ LIỆU THÀNH VIÊN TỔ 1
        const members = [
            { name: 'Vi Đỗ Quỳnh Anh', birth: '17/11/2008', emoji: '🦋', link: 'info/quynhanh.html' },
            { name: 'Phạm Trí Dũng', birth: '04/04/2008', img: 'dung.jpg', link: 'info/tridung.html' },
            { name: 'Đỗ Ngọc Ánh', birth: '04/05/2008', emoji: '☀️', link: 'info/ngocanh.html' },
            { name: 'Lương Gia Bảo', birth: '05/05/2008', emoji: '👑', link: 'info/giabao.html' },
            { name: 'Trần Thanh Duy', birth: '22/08/2008', emoji: '⚽', link: 'info/thanhduy.html' },
            { name: 'Nguyễn Thị Duyên', birth: '07/06/2008', emoji: '🌷', link: 'info/duyen.html' },
            { name: 'Nguyễn Tiến Đạt', birth: '28/04/2007', emoji: '🎮', link: 'info/tiendat.html' },
            { name: 'Võ Thiên Đông', birth: '04/09/2008', emoji: '☁️', link: 'info/thiendong.html' },
            { name: 'Hướng Trường Giang', birth: '20/02/2008', emoji: '🌊', link: 'info/truoggiang.html' },
            { name: 'Lê Sỹ Hoàng', birth: '22/05/2008', emoji: '🐯', link: 'info/syhoang.html' }
        ];

        // Hàm hiển thị danh sách
        const grid = document.getElementById('memberGrid');
        
        grid.innerHTML = members.map(m => `
            <a href="${m.link}" class="card">
                <div class="avatar-circle">
                    ${m.img ? `<img src="${m.img}" alt="${m.name}">` : m.emoji}
                </div>
                <div class="name">${m.name}</div>
                <div class="sub-info">${m.birth}</div>
            </a>
        `).join('');
    </script>
</body>
</html>
