<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thành viên 12A2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #ebf5fb;">
    <h2 class="section-title">Thành viên lớp</h2>
    <div class="gallery-grid" id="membersGrid"></div>

    <script>
        const members = [
            { name: 'Đỗ Quỳnh Anh', birth: '17/11/2008', emoji: '👩' },
            { name: 'Lương Gia Bảo', birth: '05/05/2008', emoji: '👦' },
            // ... Bạn hãy nhập tiếp các bạn còn lại vào đây giống file gốc nhé
        ];
        document.getElementById('membersGrid').innerHTML = members.map(m => `
            <div class="gallery-item">
                <div class="gallery-img-container">${m.emoji}</div>
                <div style="font-weight:bold">${m.name}</div>
                <div style="color:#3498db">${m.birth}</div>
            </div>`).join('');
    </script>
</body>
</html>
